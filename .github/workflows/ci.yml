name: CI

on:
  push:
    branches: [main]
  pull_request:

# Dos jobs independientes (arquitectura híbrida): Node y Python.
# La suite de paridad Node<->Python se añade como tercer job en M2.
jobs:
  node:
    name: Node (api · web · core-signals)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  python:
    name: Python (quant)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/quant
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: Mypy
        run: mypy

      - name: Pytest
        run: pytest
